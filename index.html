<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{background:#0c0f14;color:#d1d5db;font-family:Inter,Segoe UI}

.top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #1f2937}
.logo{height:38px}

.search{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px;color:#fff;width:180px}

.gamemodes{display:flex;gap:10px;padding:12px;overflow-x:auto;border-bottom:1px solid #1f2937}

.mode{flex:0 0 auto;background:#111827;border:1px solid #374151;padding:10px 14px;border-radius:12px;color:#9ca3af;cursor:pointer}
.mode.active{border-color:#fff;color:#fff}

.board{margin:14px;border-radius:16px;overflow:hidden;border:1px solid #1f2937}

.row{display:grid;grid-template-columns:1fr 100px;padding:12px;border-top:1px solid #1f2937;align-items:center;position:relative}
.row:hover{background:#151a22}

.left{display:flex;align-items:center;gap:10px}

.skin{width:48px;height:48px;border-radius:8px}

.playerName{font-weight:700}
.sub{font-size:12px;color:#9ca3af}

.tiers{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

.t{
padding:4px 6px;
border-radius:6px;
font-size:11px;
font-weight:700;
display:flex;
flex-direction:column;
align-items:center
}

.t span{font-size:9px;opacity:.7}

.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#9ca3af}

.rankBox{
position:absolute;
right:0;
top:0;
height:100%;
width:90px;
display:flex;
align-items:center;
justify-content:center;
clip-path:polygon(25% 0,100% 0,100% 100%,0% 100%);
font-weight:900;
font-size:18px
}

.r1{background:linear-gradient(135deg,#ffd700,#b89600);color:#000}
.r2{background:linear-gradient(135deg,#c0c0c0,#8a8a8a);color:#000}
.r3{background:linear-gradient(135deg,#cd7f32,#8b5a2b);color:#fff}
.rX{background:#111827;color:#9ca3af}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}

.box{background:#0f141b;border:1px solid #1f2937;border-radius:16px;padding:20px;width:320px;text-align:center}
.box img{width:120px;margin:10px auto;display:block}
.big{font-size:20px;font-weight:800}

.tierRow{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:10px}

@media(min-width:700px){
.row{grid-template-columns:1fr 1fr 120px}
}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" placeholder="Search..." id="search">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
</div>

<div class="board">
<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<script>
const listEl=document.getElementById("list")
const modal=document.getElementById("modal")
const search=document.getElementById("search")

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+"||t==="A")return"silver"
if(t==="B+"||t==="B")return"bronze"
return"grey"
}

function rankStyle(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return"rX"
}

const modes=["mace","crystal","cart","uhc","sword","smp"]

const leaderboardData={
mace:[
{rank:1,username:"ItsCavell",tier:"S+",score:400},
{rank:2,username:"Death777gt1",tier:"S",score:355},
{rank:3,username:"ao2020oa",tier:"S",score:350},
{rank:4,username:"lifeanddeath197",tier:"D",score:100},
...Array.from({length:11},(_,i)=>({rank:i+5,username:"None",tier:"N/A",score:0}))
],
crystal:[
{rank:1,username:"ItsCavell",tier:"S+",score:400},
...Array.from({length:14},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0}))
],
cart:Array.from({length:15},(_,i)=>({rank:i+1,username:"None",tier:"N/A",score:0})),
uhc:[
{rank:1,username:"ItsCavell",tier:"S+",score:400},
...Array.from({length:14},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0}))
],
sword:[
{rank:1,username:"SordidParrot832",tier:"S",score:350},
...Array.from({length:14},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0}))
],
smp:Array.from({length:15},(_,i)=>({rank:i+1,username:"None",tier:"N/A",score:0}))
}

function getOverall(){
const map={}
modes.forEach(m=>{
leaderboardData[m].forEach(p=>{
if(p.username==="None")return
if(!map[p.username])map[p.username]={username:p.username,score:0,tiers:[]}
map[p.username].score+=p.score
map[p.username].tiers.push({mode:m,tier:p.tier})
})
})
return Object.values(map).sort((a,b)=>b.score-a.score).map((p,i)=>({...p,rank:i+1}))
}

function render(mode){
listEl.innerHTML=""
let list=mode==="overall"?getOverall():leaderboardData[mode]

list.forEach(p=>{
const row=document.createElement("div")
row.className="row"
row.onclick=()=>openModal(p,mode)

const skin=p.username==="None"
?"https://mc-heads.net/avatar/steve"
:`https://mc-heads.net/avatar/${p.username}/100`

let tiersHTML=""

if(mode==="overall"){
tiersHTML=p.tiers.map(t=>`
<div class="t ${tierClass(t.tier)}">
${t.tier}
<span>${t.mode}</span>
</div>
`).join("")
}else{
tiersHTML=`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`
}

row.innerHTML=`
<div class="left">
<img class="skin" src="${skin}" onerror="this.src='https://mc-heads.net/avatar/steve'">
<div>
<div class="playerName">${p.username}</div>
<div class="sub">${p.score} pts</div>
<div class="tiers">${tiersHTML}</div>
</div>
</div>

<div class="rankBox ${rankStyle(p.rank)}">${p.rank}</div>
`
listEl.appendChild(row)
})
}

function openModal(p,mode){
modal.style.display="flex"

let tiersHTML=""

if(mode==="overall"){
tiersHTML=p.tiers.map(t=>`<div class="t ${tierClass(t.tier)}">${t.mode}: ${t.tier}</div>`).join("")
}else{
tiersHTML=`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`
}

modalBox.innerHTML=`
<div style="text-align:right;cursor:pointer" onclick="closeModal()">✕</div>
<div class="big">${p.username}</div>
<img src="https://mc-heads.net/avatar/${p.username}/150">
<div>#${p.rank} • ${p.score} pts</div>
<div class="tierRow">${tiersHTML}</div>
`
}

function closeModal(){modal.style.display="none"}

search.addEventListener("keydown",e=>{
if(e.key==="Enter"){
const name=search.value.toLowerCase()
const p=getOverall().find(x=>x.username.toLowerCase()===name)
if(p)openModal(p,"overall")
}
})

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

render("overall")
</script>

</body>
</html>
