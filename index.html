<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0c0f14;
color:#d1d5db;
font-family:Segoe UI,Inter,sans-serif
}

.container{max-width:1100px;margin:auto;padding:15px}

.header{text-align:center;margin-bottom:15px}
.logo{height:60px}

.search{
width:100%;
margin:10px 0;
padding:10px;
background:#111827;
border:1px solid #374151;
border-radius:10px;
color:#fff
}

.navbar{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:15px
}

.btn{
flex:0 0 auto;
padding:10px 14px;
background:#111827;
border:1px solid #374151;
border-radius:10px;
cursor:pointer;
color:#9ca3af
}

.btn.active{
color:#fff;
border-color:#fff
}

.board{
display:flex;
flex-direction:column;
gap:10px
}

.row{
display:flex;
align-items:center;
background:#111827;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.2s
}

.row:hover{
transform:translateX(-4px) scale(1.01);
background:#151a22
}

.rankBox{
width:70px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:18px
}

.r1{background:linear-gradient(135deg,#ffd700,#b89600);color:#000}
.r2{background:linear-gradient(135deg,#c0c0c0,#8a8a8a);color:#000}
.r3{background:linear-gradient(135deg,#cd7f32,#8b5a2b);color:#fff}

.player{
display:flex;
align-items:center;
gap:10px;
padding:10px;
flex:1
}

.player img{
width:50px;
height:50px;
object-fit:contain;
image-rendering:pixelated
}

.info{
display:flex;
flex-direction:column
}

.name{font-weight:700}

.sub{font-size:12px;color:#9ca3af}

.tiers{
display:flex;
gap:6px;
flex-wrap:wrap;
padding:10px
}

.t{
background:#1f2937;
padding:4px 8px;
border-radius:6px;
font-size:11px;
text-align:center
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center
}

.box{
background:#0f141b;
padding:20px;
border-radius:14px;
text-align:center;
width:300px
}

.box img{
width:120px;
margin:10px 0
}

.big{font-size:20px;font-weight:800}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" id="search" placeholder="Search player...">
</div>

<div class="navbar">
<div class="btn active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="btn" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="btn" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="btn" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="btn" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="btn" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="btn" onclick="setMode('smp',this)">🌍 SMP</div>
</div>

<div class="board" id="board"></div>

</div>

<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<script>

const board=document.getElementById("board")
const modal=document.getElementById("modal")
const modalBox=document.getElementById("modalBox")

const data={
overall:[
{rank:1,username:"ItsCavell",tier:"S+",score:1200},
{rank:2,username:"Death777gt1",tier:"S",score:355},
{rank:3,username:"ao2020oa",tier:"S",score:350},
{rank:4,username:"SordidParrot832",tier:"S",score:350},
{rank:5,username:"lifeanddeath197",tier:"D",score:100},
{rank:6,username:"None",tier:"N/A",score:0},
{rank:7,username:"None",tier:"N/A",score:0},
{rank:8,username:"None",tier:"N/A",score:0},
{rank:9,username:"None",tier:"N/A",score:0},
{rank:10,username:"None",tier:"N/A",score:0}
],
mace:[
{rank:1,username:"ItsCavell",tier:"S+",score:400},
{rank:2,username:"Death777gt1",tier:"S",score:355},
{rank:3,username:"ao2020oa",tier:"S",score:350},
{rank:4,username:"lifeanddeath197",tier:"D",score:100},
{rank:5,username:"None",tier:"N/A",score:0}
],
crystal:[
{rank:1,username:"ItsCavell",tier:"S+",score:400}
],
cart:[
{rank:1,username:"None",tier:"N/A",score:0}
],
uhc:[
{rank:1,username:"ItsCavell",tier:"S+",score:400}
],
sword:[
{rank:1,username:"SordidParrot832",tier:"S",score:350}
],
smp:[
{rank:1,username:"None",tier:"N/A",score:0}
]
}

function skin(name){
if(name==="None") return "https://mc-heads.net/avatar/steve"
return "https://mc-heads.net/body/" + name + "/right"
}

function rankClass(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

function render(mode){
board.innerHTML=""

data[mode].forEach(p=>{
const row=document.createElement("div")
row.className="row"
row.onclick=()=>openModal(p)

row.innerHTML=`
<div class="rankBox ${rankClass(p.rank)}">${p.rank}</div>
<div class="player">
<img src="${skin(p.username)}">
<div class="info">
<div class="name">${p.username}</div>
<div class="sub">${p.score} points</div>
</div>
</div>
<div class="tiers">
<div class="t">${p.tier}</div>
</div>
`

board.appendChild(row)
})
}

function openModal(p){
modal.style.display="flex"
modalBox.innerHTML=`
<div onclick="modal.style.display='none'" style="cursor:pointer;text-align:right">✕</div>
<div class="big">${p.username}</div>
<img src="${skin(p.username)}">
<div>${p.score} points</div>
<div>${p.tier}</div>
`
}

function setMode(m,e){
document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"))
e.classList.add("active")
render(m)
}

document.getElementById("search").addEventListener("keydown",e=>{
if(e.key==="Enter"){
const name=e.target.value.toLowerCase()
for(const mode in data){
const found=data[mode].find(p=>p.username.toLowerCase()===name)
if(found){openModal(found);return}
}
}
})

render("overall")

</script>

</body>
</html>
