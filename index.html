<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers - Bedrock Tier Testing Leaderboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:radial-gradient(circle at top,#101533,#050814);
color:#fff;
font-family:'Segoe UI',sans-serif
}

.container{max-width:1100px;margin:auto;padding:20px}

.header{text-align:center;margin:20px 0 30px}

.logo{max-height:120px}

.navbar{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:25px
}

.gamemode-btn{
flex:0 0 auto;
background:#11162f;
border:1px solid #2a2f55;
color:#ccc;
padding:10px 16px;
border-radius:8px;
cursor:pointer
}

.gamemode-btn.active{
background:#d4af37;
color:#000;
border-color:#d4af37
}

.card{
background:rgba(20,25,60,.6);
border:1px solid rgba(255,255,255,.1);
border-radius:12px;
backdrop-filter:blur(10px);
padding:20px
}

.leaderboard-title{
text-align:center;
margin-bottom:15px;
font-size:1.4em;
color:#d4af37
}

table{width:100%;border-collapse:collapse}

th,td{padding:12px;text-align:left}

tbody tr{
border-top:1px solid rgba(255,255,255,.05);
cursor:pointer;
transition:.2s
}

tbody tr:hover{
background:rgba(255,255,255,.05)
}

.rank{font-weight:bold}

.top1{
color:#ffd700;
font-size:1.2em;
text-shadow:0 0 10px #ffd700;
font-weight:900
}

.top2{
color:#c0c0c0;
font-size:1.15em;
text-shadow:0 0 8px #c0c0c0;
font-weight:800
}

.top3{
color:#cd7f32;
font-size:1.1em;
text-shadow:0 0 6px #cd7f32;
font-weight:800
}

.tier{
padding:4px 10px;
border-radius:6px;
background:#d4af3720;
color:#d4af37;
font-weight:bold;
font-size:.9em
}

.fade-out{
opacity:0;
transform:translateY(5px);
transition:0.15s
}

.fade-in{
opacity:1;
transform:translateY(0);
transition:0.15s
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center
}

.modal-box{
background:#11162f;
padding:20px;
border-radius:12px;
text-align:center;
width:280px
}

.modal-box img{
width:120px;
margin-top:10px
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
</div>

<div class="navbar">
<button class="gamemode-btn active" onclick="switchGamemode('overall')">🏆 Overall</button>
<button class="gamemode-btn" onclick="switchGamemode('mace')">🔨 Mace</button>
<button class="gamemode-btn" onclick="switchGamemode('crystal')">💎 Crystal</button>
<button class="gamemode-btn" onclick="switchGamemode('cart')">🛒 Cart</button>
<button class="gamemode-btn" onclick="switchGamemode('uhc')">❤️ UHC</button>
<button class="gamemode-btn" onclick="switchGamemode('sword')">🗡️ Sword</button>
<button class="gamemode-btn" onclick="switchGamemode('smp')">🌍 SMP</button>
</div>

<div class="card">
<div class="leaderboard-title" id="gamemodeTitle">Overall Rankings</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Tier</th>
<th>Score</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<h2 id="modalName"></h2>
<p id="modalTier"></p>
<p id="modalScore"></p>
<img id="modalSkin">
</div>
</div>

function shorten(n){return n.length>9?n.slice(0,9)+"...":n}

function getRankClass(r){
if(r===1)return"top1"
if(r===2)return"top2"
if(r===3)return"top3"
return""
}

function switchGamemode(mode){
document.querySelectorAll('.gamemode-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');

const names={
overall:"Overall Rankings",
mace:"Mace Rankings",
crystal:"Crystal Rankings",
cart:"Cart Rankings",
uhc:"UHC Rankings",
sword:"Sword Rankings",
smp:"SMP Rankings"
};

document.getElementById('gamemodeTitle').textContent=names[mode];
renderLeaderboard(leaderboardData[mode]);
}

function openModal(p){
document.getElementById("modal").style.display="flex";
document.getElementById("modalName").textContent=p.username;
document.getElementById("modalTier").textContent="Tier: "+p.tier;
document.getElementById("modalScore").textContent="Score: "+p.score;
document.getElementById("modalSkin").src="https://mc-heads.net/body/"+p.username;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderLeaderboard(data){
const body=document.getElementById("leaderboardBody");

body.classList.remove("fade-in");
body.classList.add("fade-out");

setTimeout(()=>{
body.innerHTML="";

data.forEach(p=>{
const row=document.createElement("tr");
row.onclick=()=>openModal(p);
row.innerHTML=`
<td class="rank ${getRankClass(p.rank)}">#${p.rank}</td>
<td>${shorten(p.username)}</td>
<td><span class="tier">${p.tier}</span></td>
<td>${p.score}</td>
`;
body.appendChild(row);
});

body.classList.remove("fade-out");
body.classList.add("fade-in");

},120);
}

renderLeaderboard(leaderboardData.overall);
