<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0c0f14;
color:#d1d5db;
font-family:Inter,Segoe UI
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid #1f2937
}

.logo{height:40px}

.gamemodes{
display:flex;
gap:10px;
padding:12px 14px;
overflow-x:auto;
border-bottom:1px solid #1f2937
}

.mode{
flex:0 0 auto;
background:#111827;
border:1px solid #374151;
padding:10px 14px;
border-radius:12px;
color:#9ca3af;
cursor:pointer
}

.mode.active{
border-color:#fff;
color:#fff
}

.board{
margin:14px;
border-radius:16px;
overflow:hidden;
border:1px solid #1f2937
}

.row{
display:grid;
grid-template-columns:110px 1fr 90px 1fr;
align-items:center;
padding:12px;
border-top:1px solid #1f2937;
transition:.2s
}

.row:hover{
background:#151a22;
transform:scale(1.01)
}

.head{
background:#0f141b;
color:#6b7280;
font-size:13px
}

.rankWrap{
position:relative;
width:90px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
overflow:hidden
}

.r1{background:linear-gradient(135deg,#ffd700,#b89600)}
.r2{background:linear-gradient(135deg,#c0c0c0,#8a8a8a)}
.r3{background:linear-gradient(135deg,#cd7f32,#8b5a2b)}

.rankNum{
position:absolute;
left:6px;
top:4px;
font-weight:900;
font-size:18px;
color:#000
}

.skin{
width:60px;
height:60px;
object-fit:contain
}

.player{
display:flex;
align-items:center;
gap:10px
}

.playerName{
font-weight:600
}

.sub{
font-size:12px;
color:#9ca3af
}

.region{
padding:5px 8px;
border-radius:8px;
font-weight:700;
font-size:12px
}

.NA{background:#3b1f25;color:#ff7a8a}
.EU{background:#1f3b2b;color:#6bff9c}
.AS{background:#3b2b1f;color:#ffb86b}
.default{background:#2a2f3a;color:#aaa}

.tiers{
display:flex;
gap:5px;
flex-wrap:wrap
}

.t{
padding:4px 6px;
border-radius:6px;
font-size:11px;
font-weight:700
}

.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#9ca3af}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center
}

.box{
background:#0f141b;
border:1px solid #1f2937;
border-radius:16px;
padding:20px;
width:320px;
text-align:center
}

.box img{
width:120px;
margin:10px auto;
display:block
}

.big{
font-size:20px;
font-weight:800
}

.rankTitle{
color:#eab308;
margin:6px 0
}

.tierRow{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
margin-top:10px
}

@media(max-width:600px){
.row{
grid-template-columns:90px 1fr
}
.region,.tiers{
display:none
}
}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
</div>

<div class="board">
<div class="row head">
<div>#</div><div>Player</div><div>Region</div><div>Tiers</div>
</div>
<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<script>
const listEl=document.getElementById("list")
const modal=document.getElementById("modal")

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+"||t==="A")return"silver"
if(t==="B+"||t==="B")return"bronze"
return"grey"
}

function rankStyle(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

const leaderboardData={
overall:[
{rank:1,username:"ItsCavell",tier:"S+",score:1200,region:"EU"},
{rank:2,username:"Death777gt1",tier:"S",score:355,region:"SA"},
{rank:3,username:"ao2020oa",tier:"S",score:350,region:"EU"},
{rank:4,username:"SordidParrot832",tier:"S",score:350,region:"AS"},
{rank:5,username:"lifeanddeath197",tier:"D",score:100,region:"AS"},
...Array.from({length:5},(_,i)=>({rank:i+6,username:"None",tier:"N/A",score:0,region:""}))
],
mace:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
{rank:2,username:"Death777gt1",tier:"S",score:355,region:"SA"},
{rank:3,username:"ao2020oa",tier:"S",score:350,region:"EU"},
{rank:4,username:"lifeanddeath197",tier:"D",score:100,region:"AS"},
...Array.from({length:6},(_,i)=>({rank:i+5,username:"None",tier:"N/A",score:0,region:""}))
],
crystal:[{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
...Array.from({length:9},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],
cart:Array.from({length:10},(_,i)=>({rank:i+1,username:"None",tier:"N/A",score:0,region:""})),
uhc:[{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
...Array.from({length:9},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],
sword:[{rank:1,username:"SordidParrot832",tier:"S",score:350,region:"AS"},
...Array.from({length:9},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],
smp:Array.from({length:10},(_,i)=>({rank:i+1,username:"None",tier:"N/A",score:0,region:""}))
}

function render(mode){
listEl.innerHTML=""
leaderboardData[mode].forEach(p=>{
const row=document.createElement("div")
row.className="row"
row.onclick=()=>openModal(p,mode)

const skin=p.username==="None"
?"https://api.mcheads.org/avatar/steve"
:"https://api.mcheads.org/avatar/."+p.username+"/right/128"

row.innerHTML=`
<div>
<div class="rankWrap ${rankStyle(p.rank)}">
<div class="rankNum">${p.rank}</div>
<img class="skin" src="${skin}">
</div>
</div>
<div class="player">
<div>
<div class="playerName">${p.username}</div>
<div class="sub">${p.score} points</div>
</div>
</div>
<div><span class="region ${p.region||'default'}">${p.region||'-'}</span></div>
<div class="tiers"><div class="t ${tierClass(p.tier)}">${p.tier}</div></div>
`
listEl.appendChild(row)
})
}

function openModal(p,mode){
modal.style.display="flex"

let tiersHTML=""

if(mode==="overall"){
Object.keys(leaderboardData).forEach(m=>{
leaderboardData[m].forEach(x=>{
if(x.username===p.username){
tiersHTML+=`<div class="t ${tierClass(x.tier)}">${m}: ${x.tier}</div>`
}
})
})
}else{
tiersHTML=`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`
}

modalBox.innerHTML=`
<div style="text-align:right;cursor:pointer" onclick="closeModal()">✕</div>
<div class="big">${p.username}</div>
<img src="${p.username==="None"?"https://api.mcheads.org/avatar/steve":"https://api.mcheads.org/avatar/."+p.username+"/right/192"}">
<div>#${p.rank} (${p.score} pts)</div>
<div class="tierRow">${tiersHTML}</div>
`
}

function closeModal(){
modal.style.display="none"
}

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

render("overall")
</script>

</body>
</html>
