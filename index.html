<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrock Tier Testing Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0e27;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; margin: 30px 0 40px 0; }

        .header h1 {
            font-size: 2.5em;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(20, 20, 40, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #d4af37;
        }

        .gamemode-btn {
            padding: 12px 20px;
            background-color: #1a1f3a;
            color: #e0e0e0;
            border: 2px solid #404060;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .gamemode-btn:hover { background-color: #252d4a; border-color: #d4af37; }

        .gamemode-btn.active {
            background-color: #d4af37;
            color: #0a0e27;
            border-color: #d4af37;
        }

        .leaderboard-container {
            background: rgba(15, 18, 35, 0.9);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }

        .leaderboard-title {
            font-size: 1.5em;
            color: #d4af37;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }

        thead {
            background: linear-gradient(135deg, #1a1f3a 0%, #252d4a 100%);
            border-bottom: 3px solid #d4af37;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #d4af37;
            font-weight: 700;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #404060;
            color: #e0e0e0;
        }

        tbody tr:hover { background: rgba(212, 175, 55, 0.1); }

        .rank { font-weight: 700; font-size: 1.1em; color: #d4af37; width: 50px; }
        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }
        .rank.grey { color: #a0a0a0; }

        .medal { margin-right: 5px; }

        .username { color: #e0e0e0; font-weight: 600; }

        .tier {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
<div class="header">
<h1>⚔️ TIER TESTING LEADERBOARD ⚔️</h1>
</div>

<div class="navbar">
<button class="gamemode-btn active" onclick="switchGamemode('overall')">OVERALL</button>
<button class="gamemode-btn" onclick="switchGamemode('mace')">MACE</button>
<button class="gamemode-btn" onclick="switchGamemode('crystal')">CRYSTAL</button>
<button class="gamemode-btn" onclick="switchGamemode('cart')">CART</button>
<button class="gamemode-btn" onclick="switchGamemode('uhc')">UHC</button>
<button class="gamemode-btn" onclick="switchGamemode('sword')">SWORD</button>
<button class="gamemode-btn" onclick="switchGamemode('smp')">SMP</button>
</div>

<div class="leaderboard-container">
<div class="leaderboard-title" id="gamemodeTitle">OVERALL RANKINGS</div>

<table>
<thead>
<tr>
<th>RANK</th>
<th>USERNAME</th>
<th>TIER</th>
<th>SCORE</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>
</table>
</div>
</div>

};

function switchGamemode(gamemode) {
    document.querySelectorAll('.gamemode-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    const titles = {
        overall:'OVERALL RANKINGS',
        mace:'MACE RANKINGS',
        crystal:'CRYSTAL RANKINGS',
        cart:'CART RANKINGS',
        uhc:'UHC RANKINGS',
        sword:'SWORD RANKINGS',
        smp:'SMP RANKINGS'
    };

    document.getElementById('gamemodeTitle').textContent = titles[gamemode];
    renderLeaderboard(leaderboardData[gamemode]);
}

function getRankColor(rank){
    if(rank===1) return 'gold';
    if(rank===2) return 'silver';
    if(rank===3) return 'bronze';
    return 'grey';
}

function getMedal(rank){
    if(rank===1) return '🥇';
    if(rank===2) return '🥈';
    if(rank===3) return '🥉';
    return '';
}

function renderLeaderboard(data){
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = '';

    data.forEach(player=>{
        const row=document.createElement('tr');
        row.innerHTML=`
        <td class="rank ${getRankColor(player.rank)}"><span class="medal">${getMedal(player.rank)}</span>#${player.rank}</td>
        <td class="username">${player.username}</td>
        <td><span class="tier">${player.tier}</span></td>
        <td>${player.score}</td>
        `;
        tbody.appendChild(row);
    });
}

renderLeaderboard(leaderboardData.overall);
</script>

</html>
