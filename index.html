<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers - Leaderboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:linear-gradient(#1c1c1c,#0f0f0f);
color:#e5e5e5;
font-family:'Segoe UI',sans-serif
}

.container{max-width:1100px;margin:auto;padding:20px}

.header{text-align:center;margin:20px 0 30px}
.logo{max-height:110px}

.navbar{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:25px
}

.gamemode-btn{
flex:0 0 auto;
background:#2a2a2a;
border:1px solid #3a3a3a;
color:#bbb;
padding:10px 16px;
border-radius:8px;
cursor:pointer
}

.gamemode-btn.active{
background:#e0b84c;
color:#000;
border-color:#e0b84c
}

.card{
background:#181818;
border:1px solid #2a2a2a;
border-radius:12px;
padding:20px
}

.leaderboard-title{
text-align:center;
margin-bottom:15px;
font-size:1.4em;
color:#e0b84c
}

table{width:100%;border-collapse:collapse}

th,td{padding:12px;text-align:left}

tbody tr{
border-top:1px solid #2a2a2a;
cursor:pointer;
transition:.2s
}

tbody tr:hover{background:#222}

.rank{font-weight:bold}

.top1{color:#ffd700;font-weight:900}
.top2{color:#c0c0c0;font-weight:800}
.top3{color:#cd7f32;font-weight:800}

.tier{
padding:4px 10px;
border-radius:6px;
background:#e0b84c22;
color:#e0b84c;
font-weight:bold;
font-size:.9em
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center
}

.modal-box{
background:#1a1a1a;
padding:20px;
border-radius:12px;
text-align:center;
width:280px
}

.skin-container{
display:flex;
justify-content:center;
align-items:center;
height:140px;
}

.skin-container img{width:110px}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
</div>

<div class="navbar">
<button class="gamemode-btn active" onclick="switchGamemode('overall')">🏆 Overall</button>
<button class="gamemode-btn" onclick="switchGamemode('mace')">🔨 Mace</button>
<button class="gamemode-btn" onclick="switchGamemode('crystal')">💎 Crystal</button>
<button class="gamemode-btn" onclick="switchGamemode('cart')">🛒 Cart</button>
<button class="gamemode-btn" onclick="switchGamemode('uhc')">❤️ UHC</button>
<button class="gamemode-btn" onclick="switchGamemode('sword')">🗡️ Sword</button>
<button class="gamemode-btn" onclick="switchGamemode('smp')">🌍 SMP</button>
<button class="gamemode-btn" onclick="switchGamemode('axe')">🪓 AXE</button>
<button href="https://parrot-tiers.github.io/info" class="gamemode-btn">📜 INFO</button>
</div>

<div class="card">
<div class="leaderboard-title" id="gamemodeTitle">Overall Rankings</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Tier</th>
<th>Score</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<h2 id="modalName"></h2>
<p id="modalTier"></p>
<p id="modalScore"></p>

<div class="skin-container">
<img id="modalSkin">
</div>

</div>
</div>

function shorten(n){return n.length>9?n.slice(0,9)+"...":n}

function getRankClass(r){
if(r===1)return"top1"
if(r===2)return"top2"
if(r===3)return"top3"
return""
}

function switchGamemode(mode){
document.querySelectorAll('.gamemode-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('gamemodeTitle').textContent=mode.toUpperCase()+" RANKINGS";
renderLeaderboard(leaderboardData[mode]);
}

function openModal(p){
document.getElementById("modal").style.display="flex";
document.getElementById("modalName").textContent=p.username;
document.getElementById("modalTier").textContent="Tier: "+p.tier;
document.getElementById("modalScore").textContent="Score: "+p.score;

const skin=document.getElementById("modalSkin");

if(p.username==="None"){
skin.style.visibility="hidden";
return;
}

skin.style.visibility="visible";
skin.src="https://mc-heads.net/avatar/."+p.username+"/110";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderLeaderboard(data){
const body=document.getElementById("leaderboardBody");
body.innerHTML="";

data.forEach(p=>{
const row=document.createElement("tr");
row.onclick=()=>openModal(p);
row.innerHTML=`
<td class="rank ${getRankClass(p.rank)}">#${p.rank}</td>
<td>${shorten(p.username)}</td>
<td><span class="tier">${p.tier}</span></td>
<td>${p.score}</td>
`;
body.appendChild(row);
});
}

renderLeaderboard(leaderboardData.overall);
