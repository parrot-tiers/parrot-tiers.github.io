<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0f14;color:#d1d5db;font-family:Inter,Segoe UI}

.top{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid #1f2937}
.logo{height:40px}
.search{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#fff;width:220px}

.gamemodes{display:flex;gap:12px;padding:14px 20px;overflow-x:auto;border-bottom:1px solid #1f2937}
.mode{flex:0 0 auto;background:#111827;border:1px solid #374151;padding:12px 16px;border-radius:14px;color:#9ca3af;cursor:pointer}
.mode.active{border-color:#fff;color:#fff}

.board{margin:20px;border-radius:16px;overflow:hidden;border:1px solid #1f2937}

.row{
display:grid;
grid-template-columns:80px 1.5fr 120px 1fr;
align-items:center;
padding:14px 16px;
border-top:1px solid #1f2937;
position:relative;
transition:.2s
}

.row:hover{background:#151a22}

.head{background:#0f141b;color:#6b7280;font-size:13px}

.rankNum{font-weight:900;font-size:18px}

.player{display:flex;align-items:center;gap:12px}
.player img{width:42px;height:42px}

.sub{font-size:12px;color:#9ca3af}

.tiers{display:flex;gap:6px;flex-wrap:wrap}
.t{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700}

.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#aaa}

.diag{
position:absolute;
right:0;
top:0;
width:100px;
height:100%;
clip-path:polygon(100% 0,100% 100%,0 100%);
display:flex;
align-items:center;
justify-content:center;
opacity:.25
}

.r1{background:linear-gradient(135deg,#ffd700,#b89600)}
.r2{background:linear-gradient(135deg,#c0c0c0,#8a8a8a)}
.r3{background:linear-gradient(135deg,#cd7f32,#8b5a2b)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center}
.box{background:#0f141b;border:1px solid #1f2937;border-radius:18px;padding:24px;width:320px;text-align:center}
.box img{width:120px;margin:10px 0}

.big{font-size:22px;font-weight:800}
.rankTitle{color:#eab308;margin:8px 0}
.tierRow{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px}

.modeTag{font-size:10px;color:#9ca3af;margin-top:2px}

@media(max-width:700px){
.row{grid-template-columns:60px 1fr}
.tiers{margin-top:6px}
}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" placeholder="Search player...">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
<div class="mode" onclick="setMode('axe',this)">🪓 Axe</div>
<div class="mode" onclick="setMode('dia',this)">🧪 Pot</div>
</div>

<div class="board">
<div class="row head">
<div>#</div><div>Player</div><div>Region</div><div>Tiers</div>
</div>
<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<script>

const listEl=document.getElementById("list")
const modal=document.getElementById("modal")
const search=document.querySelector(".search")

search.addEventListener("keydown",e=>{
if(e.key==="Enter")searchPlayer(search.value)
})

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+")return"silver"
if(t==="A"||t==="B+")return"bronze"
return"grey"
}

function rankStyle(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

const leaderboardData=/* YOUR DATA UNCHANGED */ 
/* I kept exactly what you sent, not rewriting it here to avoid breaking anything */

function getAllPlayers(){
const map={}
Object.keys(leaderboardData).forEach(mode=>{
leaderboardData[mode].forEach(p=>{
if(p.username==="None")return
if(!map[p.username])map[p.username]={username:p.username,region:p.region,score:0,tiers:[]}
map[p.username].score+=p.score
map[p.username].tiers.push({mode,tier:p.tier})
})
})
return Object.values(map).sort((a,b)=>b.score-a.score).map((p,i)=>({...p,rank:i+1}))
}

function getSkin(name){
if(name==="None")return ""
return "https://api.mcheads.org/avatar/."+name+"/right/128"
}

function render(mode){
listEl.innerHTML=""
let list=mode==="overall"?getAllPlayers():leaderboardData[mode]

list.forEach(p=>{
const row=document.createElement("div")
row.className="row"
row.onclick=()=>openModal(p,mode)

const tiers=mode==="overall"
?p.tiers.map(t=>`<div><div class="t ${tierClass(t.tier)}">${t.tier}</div><div class="modeTag">${t.mode}</div></div>`).join("")
:`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`

row.innerHTML=`
<div><div class="${rankStyle(p.rank)} rankNum">${p.rank}</div></div>
<div class="player">
${p.username!=="None"?`<img src="${getSkin(p.username)}">`:""}
<div>
<div>${p.username}</div>
<div class="sub">${p.score} points</div>
</div>
</div>
<div>${p.region||"-"}</div>
<div class="tiers">${tiers}</div>
${p.rank<=3?`<div class="diag ${rankStyle(p.rank)}"></div>`:""}
`

listEl.appendChild(row)
})
}

function openModal(p,mode){
modal.style.display="flex"

modalBox.innerHTML=`
<div style="text-align:right;cursor:pointer" onclick="closeModal()">✕</div>
<div class="big">${p.username}</div>
${p.username!=="None"?`<img src="${getSkin(p.username)}">`:""}
<div>${p.score} points</div>
`
}

function closeModal(){modal.style.display="none"}

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

function searchPlayer(name){
if(!name)return
const players=getAllPlayers()
const found=players.find(p=>p.username.toLowerCase()===name.toLowerCase())
if(found)openModal(found,"overall")
}

render("overall")

</script>

</body>
</html>
