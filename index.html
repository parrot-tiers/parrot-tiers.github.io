<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0f14;color:#d1d5db;font-family:Inter,Segoe UI}

.top{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid #1f2937}
.logo{height:40px}
.search{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#fff;width:220px}

.gamemodes{display:flex;gap:12px;padding:14px 20px;overflow-x:auto;border-bottom:1px solid #1f2937}
.mode{flex:0 0 auto;background:#111827;border:1px solid #374151;padding:12px 16px;border-radius:14px;color:#9ca3af;cursor:pointer}
.mode.active{border-color:#fff;color:#fff}

.subbar{display:flex;justify-content:flex-end;gap:10px;padding:12px 20px}
.btn{background:#111827;border:1px solid #374151;padding:8px 12px;border-radius:10px;color:#cbd5e1;cursor:pointer}

.board{margin:20px;border-radius:16px;overflow:hidden;border:1px solid #1f2937}
.row{display:grid;grid-template-columns:90px 1.6fr 120px 1fr;align-items:center;padding:14px 16px;border-top:1px solid #1f2937;transition:.25s}
.row:hover{background:#151a22;transform:translateX(-6px) scale(1.02)}
.head{background:#0f141b;color:#6b7280;font-size:13px}

.rankNum{font-weight:900;font-size:20px}
.r1{background:linear-gradient(90deg,#ffd700,#b89600);color:#000;padding:8px 14px;border-radius:8px}
.r2{background:linear-gradient(90deg,#c0c0c0,#8a8a8a);color:#000;padding:8px 14px;border-radius:8px}
.r3{background:linear-gradient(90deg,#cd7f32,#8b5a2b);color:#fff;padding:8px 14px;border-radius:8px}

.player{display:flex;align-items:center;gap:12px}
.player img{width:40px;border-radius:8px}
.sub{font-size:12px;color:#9ca3af}

.region{padding:5px 9px;border-radius:8px;font-weight:700;font-size:12px}
.NA{background:#3b1f25;color:#ff7a8a}
.EU{background:#1f3b2b;color:#6bff9c}
.AS{background:#3b2b1f;color:#ffb86b}
.AU{background:#3b2b3a;color:#ff9cff}
.default{background:#2a2f3a;color:#aaa}

.tiers{display:flex;gap:6px}
.t{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#9ca3af}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center}
.box{background:#0f141b;border:1px solid #1f2937;border-radius:18px;padding:24px;width:330px;text-align:center;position:relative}
.close{position:absolute;top:10px;right:14px;cursor:pointer;font-size:18px}
.box img{width:100px;margin:10px 0}
.big{font-size:22px;font-weight:800}
.rankTitle{color:#eab308;margin:8px 0}
.tierRow{display:flex;justify-content:center;gap:6px;margin-top:10px}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" placeholder="Search player...">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
<div class="mode" onclick="setMode('axe',this)">🪓 Axe</div>
<div class="mode" onclick="setMode('dia',this)">🧪 Pot</div>
</div>

<div class="subbar">
<div class="btn" onclick="alert('Info page coming soon')">ℹ Information</div>
<div class="btn" onclick="window.open('https://discord.gg/Q5rnbtrZxq')">Discord</div>
</div>

<div class="board">
<div class="row head">
<div>#</div><div>Player</div><div>Region</div><div>Tiers</div>
</div>
<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="box">
<div class="close" onclick="closeModal()">✕</div>
<div id="mName" class="big"></div>
<div id="mRank" class="rankTitle"></div>
<img id="mSkin">
<div id="mPos"></div>
<div class="tierRow" id="mTiers"></div>
</div>
</div>

<script>

const listEl=document.getElementById("list")
const modal=document.getElementById("modal")

document.querySelector(".search").addEventListener("keydown",e=>{
if(e.key==="Enter")searchPlayer(e.target.value)
})

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+")return"silver"
if(t==="A"||t==="B+")return"bronze"
return"grey"
}

function rankStyle(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

function getAllPlayers(){
const map={}
Object.keys(leaderboardData).forEach(mode=>{
if(mode==="overall")return
leaderboardData[mode].forEach(p=>{
if(p.username==="None")return
if(!map[p.username])map[p.username]={username:p.username,region:p.region,score:0,tiers:[]}
map[p.username].score+=p.score
map[p.username].tiers.push(p.tier)
})
})
return Object.values(map).sort((a,b)=>b.score-a.score).map((p,i)=>({...p,rank:i+1}))
}

function render(mode){
listEl.innerHTML=""
const list=mode==="overall"?getAllPlayers():leaderboardData[mode]

list.forEach(p=>{
const row=document.createElement("div")
row.className="row"
row.onclick=()=>openModal(p)

const tiers=mode==="overall"?p.tiers:[p.tier]

row.innerHTML=`
<div><div class="${rankStyle(p.rank)} rankNum">${p.rank}.</div></div>
<div class="player">
<img src="https://api.mineatar.io/face/${p.username}">
<div>
<div>${p.username}</div>
<div class="sub">${p.score} points</div>
</div>
</div>
<div><span class="region ${p.region||'default'}">${p.region||'-'}</span></div>
<div class="tiers">${tiers.map(t=>`<div class="t ${tierClass(t)}">${t}</div>`).join("")}</div>
`
listEl.appendChild(row)
})
}

function openModal(p){
modal.style.display="flex"
mName.textContent=p.username
mRank.textContent=p.score+" points"
mSkin.src=`https://api.mineatar.io/face/${p.username}`
mPos.textContent="#"+p.rank+" Overall"
mTiers.innerHTML=(p.tiers||[p.tier]).map(t=>`<div class="t ${tierClass(t)}">${t}</div>`).join("")
}

function closeModal(){
modal.style.display="none"
}

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

function searchPlayer(name){
if(!name)return
const players=getAllPlayers()
const p=players.find(x=>x.username.toLowerCase()===name.toLowerCase())
if(p)openModal(p)
else{
modal.style.display="flex"
mName.textContent=name
mRank.textContent="Unranked"
mSkin.src=`https://api.mineatar.io/face/${name}`
mPos.textContent=""
mTiers.innerHTML=""
}
}

render("overall")

</script>

</body>
</html>
