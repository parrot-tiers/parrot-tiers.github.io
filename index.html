<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0f14;color:#d1d5db;font-family:Inter,Segoe UI}

.top{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid #1f2937}
.logo{height:40px}
.search{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#fff;width:220px}

.gamemodes{display:flex;gap:12px;padding:14px 20px;overflow-x:auto;border-bottom:1px solid #1f2937}
.mode{flex:0 0 auto;background:#111827;border:1px solid #374151;padding:12px 16px;border-radius:14px;color:#9ca3af;cursor:pointer}
.mode.active{border-color:#fff;color:#fff}

.subbar{display:flex;justify-content:flex-end;gap:10px;padding:12px 20px}
.btn{background:#111827;border:1px solid #374151;padding:8px 12px;border-radius:10px;color:#cbd5e1;cursor:pointer}

.board{margin:20px;border-radius:16px;overflow:hidden;border:1px solid #1f2937}
.row{position:relative;display:grid;grid-template-columns:90px 1.6fr 120px 1fr;align-items:center;padding:14px 16px;border-top:1px solid #1f2937;transition:.25s}
.row:hover{background:#151a22;transform:translateX(-6px) scale(1.02)}
.head{background:#0f141b;color:#6b7280;font-size:13px}

.rankNum{font-weight:900;font-size:20px}

.r1::before,.r2::before,.r3::before{
content:"";
position:absolute;
top:0;
left:0;
width:160px;
height:100%;
clip-path:polygon(0 0,70% 0,100% 100%,0 100%);
z-index:0;
opacity:.95;
}

.r1::before{background:linear-gradient(135deg,#ffd700,#e6b800)}
.r2::before{background:linear-gradient(135deg,#c0c0c0,#9e9e9e)}
.r3::before{background:linear-gradient(135deg,#cd7f32,#a0522d)}

.r1:hover::before,.r2:hover::before,.r3:hover::before{
animation:shine .8s linear;
}

@keyframes shine{
0%{filter:brightness(1)}
50%{filter:brightness(1.8)}
100%{filter:brightness(1)}
}

.row > *{position:relative;z-index:1;}

.player{display:flex;align-items:center;gap:12px}
.player img{width:40px;border-radius:8px}

.sub{font-size:12px;color:#9ca3af}

.region{padding:5px 9px;border-radius:8px;font-weight:700;font-size:12px}
.NA{background:#3b1f25;color:#ff7a8a}
.EU{background:#1f3b2b;color:#6bff9c}
.AS{background:#3b2b1f;color:#ffb86b}
.SA{background:#2b2b3b;color:#8ab4ff}
.default{background:#2a2f3a;color:#aaa}

.tiers{display:flex;gap:6px;flex-wrap:wrap}
.t{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#9ca3af}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.box{
background:#0f141b;
border:1px solid #1f2937;
border-radius:18px;
padding:24px;
width:330px;
text-align:center;
z-index:10000;
}

.box img{width:100px;margin:10px 0}
.big{font-size:22px;font-weight:800}
.rankTitle{color:#eab308;margin:8px 0}
.tierRow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px}

@media(max-width:700px){

.row{
grid-template-columns:70px 1fr;
grid-template-rows:auto auto auto;
}

.r1::before,.r2::before,.r3::before{
display:none;
}

.region{
display:inline-block;
margin-top:4px;
}

.board,.top,.gamemodes,.subbar{
position:relative;
z-index:1;
}

.modal{
z-index:9999;
}

}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" placeholder="Search player...">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
<div class="mode" onclick="setMode('axe',this)">🪓 Axe</div>
<div class="mode" onclick="setMode('dia',this)">🧪 Pot</div>
</div>

<div class="subbar">
<div class="btn" onclick="window.open('https://parrot-tiers.github.io/info')">Information</div>
<div class="btn" onclick="window.open('https://discord.gg/Q5rnbtrZxq')">Discord</div>
</div>

<div class="board">
<div class="row head">
<div>#</div><div>Player</div><div>Region</div><div>Tiers</div>
</div>
<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<script>
const listEl=document.getElementById("list")
const modal=document.getElementById("modal")
const modalBox=document.getElementById("modalBox")
const search=document.querySelector(".search")

search.addEventListener("keydown",e=>{
if(e.key==="Enter")searchPlayer(search.value)
})

function getRankTitle(s){
if(s>=1500)return"Combat Grandmaster"
if(s>=1250)return"Combat Master"
if(s>=1000)return"Combat Ace"
if(s>=500)return"Combat Specialist"
if(s>=250)return"Combat Cadet"
if(s>=100)return"Combat Novice"
return"Rookie"
}

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+")return"silver"
if(t==="A"||t==="B+")return"bronze"
return"grey"
}

function rankStyle(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

const leaderboardData={
mace:[
{rank:1,username:"ItsCavell",tier:"S+",score:450,region:"EU"},
{rank:2,username:"Death777gt1",tier:"S+",score:400,region:"SA"},
{rank:3,username:"ao2020oa",tier:"S",score:350,region:"EU"},
{rank:4,username:"xylen0r",tier:"A",score:250,region:"AS"},
{rank:5,username:"SordidParrot832",tier:"A",score:250,region:"AS"},
{rank:6,username:"Tiktok RAZZA",tier:"A",score:250,region:"EU"},
{rank:7,username:"lifeanddeath197",tier:"D",score:100,region:"AS"},
...Array.from({length:13},(_,i)=>({rank:i+8,username:"None",tier:"N/A",score:0,region:""}))
],
crystal:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
{rank:2,username:"SordidParrot832",tier:"C",score:150,region:"AS"},
{rank:3,username:"Tiktok RAZZA",tier:"C",score:150,region:"EU"},
...Array.from({length:17},(_,i)=>({rank:i+4,username:"None",tier:"N/A",score:0,region:""}))
],
cart:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
...Array.from({length:20},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],
uhc:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
{rank:2,username:"SordidParrot832",tier:"B",score:200,region:"AS"},
...Array.from({length:18},(_,i)=>({rank:i+3,username:"None",tier:"N/A",score:0,region:""}))
],
sword:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
{rank:2,username:"xylen0r",tier:"C",score:150,region:"AS"},
...Array.from({length:18},(_,i)=>({rank:i+3,username:"None",tier:"N/A",score:0,region:""}))
],
axe:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
{rank:2,username:"ItsCavell",tier:"B",score:200,region:"EU"},
...Array.from({length:18},(_,i)=>({rank:i+3,username:"None",tier:"N/A",score:0,region:""}))
],
dia:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
...Array.from({length:19},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],
smp:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
{rank:2,username:"ItsCavell",tier:"S",score:350,region:"EU"},
{rank:3,username:"Death777gt1",tier:"A+",score:300,region:"SA"},
{rank:4,username:"TikTok RAZZA",tier:"C",score:150,region:"EU"},
{rank:5,username:"xylen0r",tier:"B",score:200,region:"AS"},
{rank:6,username:"Godarush007",tier:"D",score:100,region:"AS"},
...Array.from({length:14},(_,i)=>({rank:i+7,username:"None",tier:"N/A",score:0,region:""}))
]
}

function getAllPlayers(){
const map={}
Object.keys(leaderboardData).forEach(mode=>{
leaderboardData[mode].forEach(p=>{
if(p.username==="None")return
if(!map[p.username])map[p.username]={username:p.username,region:p.region,score:0,tiers:[]}
map[p.username].score+=p.score
map[p.username].tiers.push({mode,tier:p.tier})
})
})
return Object.values(map).sort((a,b)=>b.score-a.score).map((p,i)=>({...p,rank:i+1}))
}

function render(mode){
listEl.innerHTML=""
let list=mode==="overall"?getAllPlayers():leaderboardData[mode]

list.forEach(p=>{
const row=document.createElement("div")
row.className="row "+rankStyle(p.rank)
row.onclick=()=>openModal(p)

const tiers=mode==="overall"
?p.tiers.map(t=>`<div class="t ${tierClass(t.tier)}">${t.tier}</div>`).join("")
:`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`

row.innerHTML=`
<div class="rankNum">${p.rank}.</div>
<div class="player">
<img src="https://mc-heads.net/avatar/Steve">
<div>
<div>${p.username}</div>
${mode==="overall"?`<div class="sub">${getRankTitle(p.score)} (${p.score})</div>`:""}
</div>
</div>
<div><span class="region ${p.region||'default'}">${p.region||'-'}</span></div>
<div class="tiers">${tiers}</div>
`
listEl.appendChild(row)
})
}

function openModal(p){
modal.style.display="flex"

let tiers=[]
Object.keys(leaderboardData).forEach(mode=>{
const f=leaderboardData[mode].find(x=>x.username===p.username)
if(f && f.username!=="None"){
tiers.push({mode,tier:f.tier})
}
})

modalBox.innerHTML=`
<div style="text-align:right;cursor:pointer" onclick="closeModal()">✕</div>
<div class="big">${p.username}</div>
<div class="rankTitle">${getRankTitle(p.score)}</div>
<img src="https://mc-heads.net/avatar/Steve">
<div>#${p.rank} (${p.score} points)</div>

<div class="tierRow">
${tiers.map(t=>`
<div style="text-align:center">
<div class="t ${tierClass(t.tier)}">${t.tier}</div>
<div style="font-size:10px;color:#9ca3af;margin-top:2px">${t.mode}</div>
</div>
`).join("")}
</div>
`
}

function closeModal(){modal.style.display="none"}

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

function searchPlayer(name){
if(!name)return
const players=getAllPlayers()
const found=players.find(p=>p.username.toLowerCase()===name.toLowerCase())
if(found)openModal(found)
}

render("overall")
</script>

</body>
</html>
