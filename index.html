<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers - Bedrock Tier Testing Leaderboard</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at top, #101533, #050814);
    color:#fff;
    font-family: 'Segoe UI', sans-serif;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align:center;
    margin: 20px 0 30px;
}

.logo {
    max-height:120px;
}

.navbar {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.gamemode-btn {
    background:#11162f;
    border:1px solid #2a2f55;
    color:#ccc;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.25s;
}

.gamemode-btn:hover {
    background:#1c2245;
    color:#fff;
}

.gamemode-btn.active {
    background:#d4af37;
    color:#000;
    border-color:#d4af37;
}

.card {
    background: rgba(20,25,60,0.6);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    backdrop-filter: blur(10px);
    padding:20px;
}

.leaderboard-title {
    text-align:center;
    margin-bottom:15px;
    font-size:1.4em;
    color:#d4af37;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:12px;
    text-align:left;
}

th {
    color:#aaa;
    font-size:0.85em;
}

tbody tr {
    border-top:1px solid rgba(255,255,255,0.05);
    transition:0.2s;
}

tbody tr:hover {
    background: rgba(255,255,255,0.05);
}

.rank {
    font-weight:bold;
}

.gold { color:#ffd700; }
.silver { color:#c0c0c0; }
.bronze { color:#cd7f32; }

.tier {
    padding:4px 10px;
    border-radius:6px;
    background:#d4af3720;
    color:#d4af37;
    font-weight:bold;
    font-size:0.9em;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
</div>

<div class="navbar">
<button class="gamemode-btn active" onclick="switchGamemode('overall')">🏆 Overall</button>
<button class="gamemode-btn" onclick="switchGamemode('mace')">🔨 Mace</button>
<button class="gamemode-btn" onclick="switchGamemode('crystal')">💎 Crystal</button>
<button class="gamemode-btn" onclick="switchGamemode('cart')">🛒 Cart</button>
<button class="gamemode-btn" onclick="switchGamemode('uhc')">❤️ UHC</button>
<button class="gamemode-btn" onclick="switchGamemode('sword')">🗡️ Sword</button>
<button class="gamemode-btn" onclick="switchGamemode('smp')">🌍 SMP</button>
</div>

<div class="card">
<div class="leaderboard-title" id="gamemodeTitle">Overall Rankings</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Tier</th>
<th>Score</th>

<tbody id="leaderboardBody"></tbody>

</div>

function switchGamemode(mode){
    document.querySelectorAll('.gamemode-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');

    const names={
        overall:"Overall Rankings",
        mace:"Mace Rankings",
        crystal:"Crystal Rankings",
        cart:"Cart Rankings",
        uhc:"UHC Rankings",
        sword:"Sword Rankings",
        smp:"SMP Rankings"
    };

    document.getElementById('gamemodeTitle').textContent = names[mode];
    renderLeaderboard(leaderboardData[mode]);
}

function getRankClass(r){
    if(r===1) return "gold";
    if(r===2) return "silver";
    if(r===3) return "bronze";
    return "";
}

function renderLeaderboard(data){
    const body=document.getElementById("leaderboardBody");
    body.innerHTML="";

    data.forEach(p=>{
        const row=document.createElement("tr");
        row.innerHTML=`
        <td class="rank ${getRankClass(p.rank)}">#${p.rank}</td>
        <td>${p.username}</td>
        <td><span class="tier">${p.tier}</span></td>
        <td>${p.score}</td>
        `;
        body.appendChild(row);
    });
}

renderLeaderboard(leaderboardData.overall);
