<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrot Tiers</title>
<link rel="icon" href="/images/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0f14;color:#d1d5db;font-family:Inter,Segoe UI}

.top{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid #1f2937}
.logo{height:40px}
.search{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#fff;width:220px}

.gamemodes{display:flex;gap:12px;padding:14px 20px;overflow-x:auto;border-bottom:1px solid #1f2937}
.mode{flex:0 0 auto;background:#111827;border:1px solid #374151;padding:12px 16px;border-radius:14px;color:#9ca3af;cursor:pointer}
.mode.active{border-color:#fff;color:#fff}

.board{margin:20px;border-radius:16px;overflow:hidden;border:1px solid #1f2937}
.row{display:grid;grid-template-columns:90px 1.6fr 120px 1fr;align-items:center;padding:14px 16px;border-top:1px solid #1f2937;position:relative;overflow:hidden}
.row:hover{background:#151a22}

.row::after{
content:"";
position:absolute;
right:0;
top:0;
width:120px;
height:100%;
clip-path:polygon(100% 0,100% 100%,0 100%);
opacity:.15;
}

.r1::after{background:#ffd700}
.r2::after{background:#c0c0c0}
.r3::after{background:#cd7f32}

.rankNum{font-weight:900;font-size:20px}

.player{display:flex;align-items:center;gap:12px}
.player img{width:40px;border-radius:8px}

.region{padding:5px 9px;border-radius:8px;font-weight:700;font-size:12px}
.EU{background:#1f3b2b;color:#6bff9c}
.AS{background:#3b2b1f;color:#ffb86b}
.SA{background:#1f2f3b;color:#6bbcff}
.default{background:#2a2f3a;color:#aaa}

.tiers{display:flex;gap:6px;flex-wrap:wrap}
.t{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.gold{background:#ffd700;color:#000}
.gold2{background:#f0c000;color:#000}
.silver{background:#c0c0c0;color:#000}
.bronze{background:#cd7f32;color:#fff}
.grey{background:#374151;color:#9ca3af}
</style>
</head>

<body>

<div class="top">
<img src="file_00000000c5347246b0f83834a91f3221.png" class="logo">
<input class="search" placeholder="Search player...">
</div>

<div class="gamemodes">
<div class="mode active" onclick="setMode('overall',this)">🏆 Overall</div>
<div class="mode" onclick="setMode('mace',this)">🔨 Mace</div>
<div class="mode" onclick="setMode('crystal',this)">💎 Crystal</div>
<div class="mode" onclick="setMode('cart',this)">🛒 Cart</div>
<div class="mode" onclick="setMode('uhc',this)">❤️ UHC</div>
<div class="mode" onclick="setMode('sword',this)">🗡 Sword</div>
<div class="mode" onclick="setMode('smp',this)">🌍 SMP</div>
<div class="mode" onclick="setMode('axe',this)">🪓 Axe</div>
<div class="mode" onclick="setMode('dia',this)">🧪 Pot</div>
</div>

<div class="board">
<div id="list"></div>
</div>

<script>

const listEl=document.getElementById("list")

function tierClass(t){
if(t==="S+")return"gold"
if(t==="S")return"gold2"
if(t==="A+")return"silver"
if(t==="A"||t==="B+")return"bronze"
return"grey"
}

function rankClass(r){
if(r===1)return"r1"
if(r===2)return"r2"
if(r===3)return"r3"
return""
}

const leaderboardData={
mace:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
{rank:2,username:"Death777gt1",tier:"S",score:355,region:"SA"},
{rank:3,username:"ao2020oa",tier:"S",score:350,region:"EU"},
{rank:4,username:"xylen0r",tier:"A",score:250,region:"AS"},
{rank:5,username:"SordidParrot832",tier:"A",score:250,region:"AS"},
{rank:6,username:"lifeanddeath197",tier:"D",score:100,region:"AS"},
...Array.from({length:14},(_,i)=>({rank:i+7,username:"None",tier:"N/A",score:0,region:""}))
],

crystal:[
{rank:1,username:"ItsCavell",tier:"S+",score:400,region:"EU"},
...Array.from({length:19},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],

cart:Array.from({length:20},(_,i)=>({rank:i+1,username:"None",tier:"N/A",score:0,region:""})),

uhc:[
{rank:1,username:"ItsCavell",tier:"S",score:350,region:"EU"},
{rank:2,username:"SordidParrot832",tier:"B",score:200,region:"AS"},
...Array.from({length:18},(_,i)=>({rank:i+3,username:"None",tier:"N/A",score:0,region:""}))
],

sword:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
...Array.from({length:19},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],

axe:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
{rank:2,username:"ItsCavell",tier:"B",score:200,region:"EU"},
...Array.from({length:18},(_,i)=>({rank:i+3,username:"None",tier:"N/A",score:0,region:""}))
],

dia:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
...Array.from({length:19},(_,i)=>({rank:i+2,username:"None",tier:"N/A",score:0,region:""}))
],

smp:[
{rank:1,username:"SordidParrot832",tier:"S+",score:400,region:"AS"},
{rank:2,username:"ItsCavell",tier:"S",score:350,region:"EU"},
{rank:3,username:"Death777gt1",tier:"A+",score:300,region:"SA"},
{rank:4,username:"xylen0r",tier:"B",score:200,region:"AS"},
{rank:5,username:"Godarush007",tier:"D",score:100,region:"AS"},
...Array.from({length:15},(_,i)=>({rank:i+6,username:"None",tier:"N/A",score:0,region:""}))
]
}

function getOverall(){
const map={}
Object.values(leaderboardData).forEach(mode=>{
mode.forEach(p=>{
if(p.username==="None")return
if(!map[p.username])map[p.username]={username:p.username,score:0,region:p.region,tiers:[]}
map[p.username].score+=p.score
map[p.username].tiers.push(p.tier)
})
})
return Object.values(map).sort((a,b)=>b.score-a.score).map((p,i)=>({...p,rank:i+1}))
}

function render(mode){
listEl.innerHTML=""
let list=mode==="overall"?getOverall():leaderboardData[mode]

list.forEach(p=>{
const row=document.createElement("div")
row.className="row "+rankClass(p.rank)

const tiers=mode==="overall"
?p.tiers.map(t=>`<div class="t ${tierClass(t)}">${t}</div>`).join("")
:`<div class="t ${tierClass(p.tier)}">${p.tier}</div>`

row.innerHTML=`
<div class="rankNum">${p.rank}</div>
<div class="player">
<img src="https://api.mcheads.org/avatar/.${p.username}/right/64">
<div>${p.username}</div>
</div>
<div><span class="region ${p.region||'default'}">${p.region||'-'}</span></div>
<div class="tiers">${tiers}</div>
`

listEl.appendChild(row)
})
}

function setMode(m,e){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"))
e.classList.add("active")
render(m)
}

render("overall")

</script>
</body>
</html>
